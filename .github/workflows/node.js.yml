name: ESP32 Build and Flash

on:
  push:

jobs:
  build_and_flash:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load ESP-IDF
        run: |
          source ~/esp-idf/export.sh
          idf.py --version

      - name: Build firmware
        run: |
          source ~/esp-idf/export.sh
          idf.py set-target esp32c3
          idf.py build

      - name: Flash firmware
        run: |
          source ~/esp-idf/export.sh
          idf.py -p /dev/ttyACM0 flash

    - name: Capture UART log
      run: |
        stty -F /dev/ttyACM0 115200
        esptool --chip esp32c3 -p /dev/ttyACM0 run
        timeout 10s cat /dev/ttyACM0 > log.txt || true
        cat log.txt
