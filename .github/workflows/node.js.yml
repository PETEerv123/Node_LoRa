name: ESP32 Build and Flash

on:
  push:

jobs:
  build_and_flash:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Load ESP-IDF
        run: |
          source ~/esp/esp-idf/export.sh
          idf.py --version

      - name: Build
        run: |
          source ~/esp/esp-idf/export.sh
          idf.py set-target esp32c3
          idf.py build

      - name: Flash
        run: |
          source ~/esp/esp-idf/export.sh
          idf.py -p /dev/ttyUSB0 flash

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/*.bin
