name: ESP32 Build and Flash

on:
  push:

jobs:
  build_and_flash:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Load ESP-IDF
        run: |
          source ~/esp-idf/export.sh
          idf.py --version

      - name: Detect serial port
        run: |
          PORT=$(ls /dev/ttyACM* /dev/ttyUSB* 2>/dev/null | head -n 1)

          if [ -z "$PORT" ]; then
            echo "ESP32 serial port not found!"
            ls /dev/tty*
            exit 1
          fi

          echo "Detected port: $PORT"
          echo "PORT=$PORT" >> $GITHUB_ENV

      - name: Build firmware
        run: |
          source ~/esp-idf/export.sh
          idf.py set-target esp32c3
          idf.py build

      - name: Flash firmware
        run: |
          source ~/esp-idf/export.sh
          idf.py -p $PORT flash

      - name: Capture UART log
              run: |
                source ~/esp-idf/export.sh
                
                # 1. Kích hoạt chip chạy (Reset)
                esptool.py --chip esp32c3 -p /dev/ttyACM0 run
                sleep 1 # Đợi 1 giây để cổng serial ổn định
                
                # 2. Thu log dùng timeout và dùng 'stty' để đọc data thô
                stty -F /dev/ttyACM0 115200 raw -echo
                
                echo "--- Đang thu thập log trong 10 giây... ---"
                # Dùng 'timeout' nhưng thêm '|| true' để tránh báo lỗi pipeline khi timeout kết thúc
                timeout 10s cat /dev/ttyACM0 > log.txt || true
                
                echo "--- KẾT QUẢ LOG TỪ CHIP ---"
                if [ -s log.txt ]; then
                  cat log.txt
                else
                  echo "Log vẫn trống! Kiểm tra lại baudrate hoặc code có in gì ra Serial không (printf/ESP_LOGI)."
                fi
